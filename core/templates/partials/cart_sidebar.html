<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h2 style="font-family:'Playfair Display', serif;">Your Bag</h2>
        <button class="close-cart" id="closeCart" aria-label="Close Cart">&times;</button>
    </div>
    <div class="cart-body">
        <ul id="cart-items-list"></ul>
    </div>
    <div class="cart-footer">
        <div class="cart-total-row">
            <span>Total</span>
            <span>Rs. <span id="total-price">0</span></span>
        </div>
        <div class="cart-actions">
            <a href="{% url 'checkout' %}" class="checkout-btn cart-primary-action" style="width:100%; text-align:center; text-decoration:none;">Proceed to Checkout</a>
            <a href="{% url 'cart' %}" class="cart-full-link">View Full Cart</a>
        </div>
        <button class="clear-cart-link" onclick="clearCart()">Clear All Items</button>
    </div>
</div>
